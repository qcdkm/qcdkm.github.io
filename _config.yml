  masish_kesarwani:
    first_name: "Manish"
    last_name: "Kesarwani"
    affiliation: "IBM Research, India"
    photo: "https://media.licdn.com/dms/image/v2/C4D03AQHDL3o6lP0yvA/profile-displayphoto-shrink_200_200/profile-displayphoto-shrink_200_200/0/1516825073024?e=2147483647&v=beta&t=XNiVSXlzbbLguxOANXnVEbR0ZE5QUdsvYI8i8dMA_34"
    website: "https://research.ibm.com/people/manish-kesarwani"
    bio: "Research Scientist at IBM Research India and Ph.D. scholar at IISc Bangalore (Database Systems Lab). IEEE Senior Member with a decade of research experience, currently working on quantum computing for DBMS engines design."
    keynote_title: "Relational Database Engines on Quantum Platforms"
    keynote_abstract: |
      Quantum computing is rapidly progressing from theory to practice, with fault-tolerant hardware expected within the coming decade. These advances raise a fundamental question for the database community: can quantum computing help solve core DBMS problems?

      This keynote talk explores the applicability of quantum computing to database management systems. We begin by examining recent advances in applying quantum algorithms to core DBMS tasks, including query optimization and index configuration selection. While these early results demonstrate the potential of quantum techniques, they also expose fundamental challenges in adapting database tasks to quantum hardware. The talk discusses these challenges and their implications for future system design, before concluding with a roadmap of open research problems that must be addressed to realize practical quantum database systems.

