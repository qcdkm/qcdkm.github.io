# ── People ──
general_chairs:
  - name: "Haridimos Kondylakis"
    affiliation: "University of Crete, Greece"
    email: "kondylak@ics.forth.gr"
    bio: "Associate Professor of Big Data Engineering. Affiliated Researcher at FORTH-ICS. Has delivered tutorials at EDBT, ISWC, VLDB and co-organized workshops and conferences including ISWC, IJCKG, HEDAI, QCDK, and IEEE Quantum Workshop."
  - name: "Stefanie Scherzinger"
    affiliation: "University of Passau, Germany"
    email: "stefanie.scherzinger@uni-passau.de"
    bio: "Full Professor of Computer Science, heading the Scalable Database Systems group. Research focuses on database schema management and quantum computing for database management tasks including query optimization and schema matching."

pc_chairs:
  - name: "Bettina Kemme"
    affiliation: "McGill University, Canada"
    email: "bettina.kemme@mcgill.ca"
    bio: "Professor and head of the Distributed Information Systems Lab (DISL). Over 100 refereed publications. Recipient of the VLDB 10-Year Test-of-Time Award and the 2024 VLDB Women in Database Award."
  - name: "Vasilis Efthymiou"
    affiliation: "Harokopio University of Athens, Greece"
    email: "vefthym@hua.gr"
    bio: "Assistant Professor. Formerly Postdoctoral Researcher at FORTH-ICS and IBM Research. Has given tutorials at SIGMOD, VLDB, WWW, ICDE, CIKM, ESWC and co-authored two books."
  - name: "Yannis Tzitzikas"
    affiliation: "University of Crete & FORTH-ICS, Greece"
    email: "yannis@ics.forth.gr"
    bio: "Professor of Information Systems. Head of Centre for Cultural Informatics of FORTH-ICS. Co-authored 3 books and over 210 papers. Four best paper awards."

proceedings_chairs:
  - name: "Manuel Wimmer"
    affiliation: "Johannes Kepler University Linz, Austria"
    email: "manuel.wimmer@jku.at"
    bio: "Full Professor, Institute of Business Informatics - Software Engineering. Research in software engineering for quantum computing, cyber-physical systems, and digital twins."
  - name: "Jose Garcia-Alonso"
    affiliation: "University of Extremadura, Spain"
    email: "jgaralo@unex.es"
    bio: "Associate Professor. Research spans quantum software engineering, pervasive computing, e-Health, and service-oriented systems. Director of Technology Transfer and Business Development."

